<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Phoenix AI</title>

    <!-- Marked.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/16.3.0/lib/marked.umd.min.js"></script>

    <!-- Prism.js -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

    <style>
        :root { --p-red: #ff1a1a; --bg: #fff; --sidebar-bg: #f9f9f9; --border: #e5e5e5; --text: #000; --input-bg: #f4f4f4; --bubble-user: #f4f4f4; --code-bg: #2d2d2d; }
        body.dark-mode { --bg: #0d0d0d; --sidebar-bg: #000; --border: #262626; --text: #ececec; --input-bg: #171717; --bubble-user: #212121; --code-bg: #1a1a1a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; transition: 0.3s; }
        #app-container { display: flex; height: 100vh; width: 100vw; }
        #sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; z-index: 200; }
        .sidebar-header { font-size: 10px; font-weight: 800; color: #888; margin: 20px 0 10px 0; text-transform: uppercase; }
        .chat-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 13px; margin-bottom: 4px; color: var(--text); }
        .chat-item.active { background: rgba(255,26,26,0.08); font-weight: 700; color: var(--p-red); }
        .landing-view #sidebar { transform: translateX(-100%); width: 0; padding: 0; visibility: hidden; }
        .landing-view #chat-container { display: none; }
        .landing-view #input-wrapper { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #landing-header { display: none; text-align: center; margin-bottom: 40px; }
        .landing-view #landing-header { display: block; }
        #chat-section { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
        #chat-header-brand { position: absolute; top: 20px; left: 30px; font-size: 14px; font-weight: 900; color: var(--p-red); }
        #chat-container { flex: 1; overflow-y: auto; padding: 80px 20px; display: flex; flex-direction: column; scroll-behavior: smooth; }
        .message { width: 100%; max-width: 800px; margin: 0 auto 24px auto; }
        .label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; padding: 0 12px; }
        .label-text { font-size: 9px; font-weight: 900; color: var(--p-red); }
        .model-badge { font-size: 8px; font-weight: 900; background: #e0e0e0; color: #777; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; margin-left: 8px; }
        .message .content { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; line-height: 1.5; }
        .message .content p { margin-bottom: 8px; }
        .code-wrapper { margin: 15px 0; border-radius: 8px; background: #222; border: 1px solid #444; overflow: hidden; display: flex; flex-direction: column; }
        .code-header { display: flex; justify-content: space-between; padding: 8px 16px; background: rgba(255,255,255,0.05); font-size: 11px; color: #aaa; border-bottom: 1px solid #333; }
        .code-body { display: flex; overflow-x: auto; }
        .line-numbers { padding: 16px 12px; color: #555; font-family: monospace; font-size: 13px; text-align: right; background: rgba(0,0,0,0.2); min-width: 40px; }
        pre { padding: 16px; margin: 0; flex: 1; font-family: monospace; font-size: 14px; color: #ddd; }
        #input-container { width: 100%; max-width: 800px; margin: 0 auto; background: var(--input-bg); border: 1px solid var(--border); border-radius: 20px; padding: 10px 18px; display: flex; align-items: center; gap: 12px; }
        textarea { flex: 1; background: transparent; border: none; font-size: 16px; outline: none; resize: none; max-height: 250px; color: var(--text); }
        .thinking-txt { font-size: 14px; opacity: 0.6; padding: 10px 0; animation: pulse 1.5s infinite; color: var(--p-red); font-weight: 900; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        #phoenix-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; }
        .modal-box { background: var(--bg); padding: 30px; border-radius: 20px; border: 1px solid var(--p-red); width: 350px; text-align: center; }
        .btn-m { padding: 10px 24px; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: 900; border: none; margin: 5px; }
        .btn-m.red { background: var(--p-red); color: white; }
        .btn-m.grey { background: #333; color: white; }
        #stop-btn { font-size: 11px; font-weight: 800; color: var(--p-red); cursor: pointer; margin-top: 8px; display: none; text-align: center; }
    </style>
</head>
<body class="light-mode">
<div id="phoenix-modal">
    <div class="modal-box">
        <h3 id="modal-title" style="color:var(--p-red); font-weight:900; margin-bottom:10px;">Phoenix AI says</h3>
        <p id="modal-desc" style="margin-bottom:20px;"></p>
        <input type="text" id="modal-input" style="display:none; width:100%; padding:10px; margin-bottom:20px; border-radius:10px; border:1px solid var(--border);">
        <div class="modal-footer">
            <button class="btn-m red" id="modal-ok">Confirm</button>
            <button class="btn-m grey" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<div id="app-container" class="landing-view">
    <div id="sidebar">
        <div class="sidebar-btn" style="padding:12px; border:1px solid var(--p-red); color:var(--p-red); text-align:center; border-radius:10px; cursor:pointer; font-size:11px; font-weight:800; margin-bottom:8px;" onclick="createNewChat()">+ NEW CHAT</div>
        <div class="sidebar-btn" style="padding:12px; border:1px solid #555; color:#555; text-align:center; border-radius:10px; cursor:pointer; font-size:11px; font-weight:800; margin-bottom:8px;" onclick="clearAllPrompt()">CLEAR HISTORY</div>
        <div class="sidebar-header">Recent</div>
        <div id="chat-list" style="flex:1; overflow-y:auto"></div>
    </div>

    <div id="chat-section">
        <div id="chat-header-brand">PHOENIX AI</div>
        <div id="chat-container"></div>
        <div id="input-wrapper" style="padding:20px; width:100%">
            <div id="landing-header"><h1>Where should we begin?</h1></div>
            <div id="preview-bar" style="display:none; padding:10px; gap:10px; max-width:800px; margin:0 auto; align-items: center;"></div>
            <div id="input-container">
                <div style="cursor:pointer; font-size:22px" onclick="document.getElementById('file-in').click()">+</div>
                <input type="file" id="file-in" hidden onchange="handleFileDirect(this.files)">
                <select id="model-select" style="background:transparent; border:none; color:var(--p-red); font-size:10px; font-weight:900; outline:none; text-transform:uppercase; cursor:pointer">
                    <option value="gpt-4o-turbo">GPT-4o-turbo (Vision)</option>
                    <option value="llama-versatile">Llama 3.1 70B</option>
                    <option value="llama-instant">Llama 3.1 8B</option>
                    <option value="llama-vision">Llama 3.2 Vision (Vision)</option>
                    <option value="glm">GLM-4.7 Flash</option>
                    <option value="kimi">Kimi-K2.5</option>
                    <option value="gemma-moe">Gemma 2 27B</option>
                </select>
                <textarea id="user-input" placeholder="Message Phoenix..." rows="1"></textarea>
                <div id="send-btn" style="color:var(--p-red); cursor:pointer; font-size:24px; font-weight:900" onclick="sendMessage()">➔</div>
            </div>
            <div id="stop-btn" onclick="stopGeneration()">Stop generating</div>
        </div>
    </div>
</div>

<script>
    const WORKER_URL = "https://phoenix-ai-proxy.prabhavd75.workers.dev/";
    let chats = JSON.parse(localStorage.getItem('phoenix_chats') || '{}');
    let activeChatId = localStorage.getItem('phoenix_active_id');
    let attachedImg = null;
    let isThinking = false;
    let abortController = null;

    function openModal(desc, cb, inp = false, init = "") {
        document.getElementById('phoenix-modal').style.display = 'flex';
        document.getElementById('modal-desc').innerText = desc;
        const i = document.getElementById('modal-input');
        i.style.display = inp ? 'block' : 'none';
        i.value = init;
        document.getElementById('modal-ok').onclick = () => {
            cb(inp ? i.value : true);
            closeModal();
        };
    }

    function closeModal() {
        document.getElementById('phoenix-modal').style.display = 'none';
    }

    function scrollToBottom() {
        const chatContainer = document.getElementById('chat-container');
        chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
    }

    function sendMessage() {
        const f = document.getElementById('user-input');
        const text = f.value.trim();
        if ((!text && !attachedImg) || isThinking) return;

        if (!activeChatId || !chats[activeChatId]) {
            createNewChat();
        }

        isThinking = true;
        document.getElementById('app-container').classList.remove('landing-view');
        document.getElementById('stop-btn').style.display = 'block';

        const selectedModel = document.getElementById('model-select').value;
        let modelToUse = selectedModel;
        let content;

        if (attachedImg) {
            // Force a vision-capable Groq model if needed
            if (selectedModel !== "gpt-4o-turbo" && selectedModel !== "llama-vision") {
                modelToUse = "llama-vision";
            }

            content = [
                { type: "text", text: text || "Analyze this image." },
                { type: "image_url", image_url: { url: attachedImg } }
            ];
        } else {
            content = text;
        }

        const historyIndex = chats[activeChatId].history.length;
        appendMessage('user', content, null, historyIndex);
        chats[activeChatId].history.push({ role: "user", content: content });

        if (chats[activeChatId].title === "New Session") {
            chats[activeChatId].title = text.substring(0, 25) || "Session";
            renderList();
        }

        f.value = '';
        f.style.height = 'auto';
        clearImg();
        save();
        getAIResponse(modelToUse);
    }

    async function getAIResponse(m) {
        const idx = chats[activeChatId].history.length;
        const div = appendMessage('ai', '', m, idx);
        const cDiv = div.querySelector('.content');
        cDiv.innerHTML = '<div id="think" class="thinking-txt">Thinking...</div>';

        try {
            abortController = new AbortController();
            const res = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages: chats[activeChatId].history, model: m }),
                signal: abortController.signal
            });

            if (!res.ok) {
                const errText = await res.text();
                console.error("Worker error:", errText);
                throw new Error(`HTTP ${res.status}`);
            }

            let full = "";

            if (res.body && res.body.getReader) {
                const reader = res.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunkRaw = decoder.decode(value);

                    full += chunkRaw;

                    if (full.trim()) {
                        div.querySelector('#think')?.remove();
                        cDiv.innerHTML = marked.parse(full);
                        addCodeFeatures(cDiv);
                        Prism.highlightAllUnder(cDiv);
                        scrollToBottom();
                    }
                }
            } else {
                const text = await res.text();
                full = text;
                div.querySelector('#think')?.remove();
                cDiv.innerHTML = marked.parse(full);
                addCodeFeatures(cDiv);
                Prism.highlightAllUnder(cDiv);
                scrollToBottom();
            }

            chats[activeChatId].history.push({ role: "assistant", content: full, modelUsed: m });
            save();
        } catch (e) {
            console.error(e);
            cDiv.innerHTML = "Phoenix had a hiccup. Please try again.";
        } finally {
            isThinking = false;
            abortController = null;
            document.getElementById('stop-btn').style.display = 'none';
        }
    }

    function stopGeneration() {
        if (abortController) {
            abortController.abort();
        }
        isThinking = false;
        document.getElementById('stop-btn').style.display = 'none';
    }

    function addCodeFeatures(c) {
        c.querySelectorAll('pre').forEach(pre => {
            if (pre.parentElement.classList.contains('code-body')) return;
            const w = document.createElement('div');
            w.className = 'code-wrapper';
            const h = document.createElement('div');
            h.className = 'code-header';
            h.innerHTML = `<span>Code</span><span onclick="navigator.clipboard.writeText(this.closest('.code-wrapper').querySelector('pre').innerText); this.innerText='COPIED'" style="cursor:pointer">Copy</span>`;
            const b = document.createElement('div');
            b.className = 'code-body';
            const n = document.createElement('div');
            n.className = 'line-numbers';

            pre.parentNode.insertBefore(w, pre);
            w.appendChild(h);
            w.appendChild(b);
            b.appendChild(n);
            b.appendChild(pre);

            const lines = pre.innerText.split('\n').length;
            n.innerHTML = Array.from({ length: lines }, (_, i) => i + 1).join('<br>');
        });
    }

    function appendMessage(r, c, m, h) {
        const d = document.createElement('div');
        d.className = `message ${r}`;
        let b = (r === 'ai' && m) ? `<span class="model-badge">${m.toUpperCase()}</span>` : '';
        d.innerHTML = `
            <div class="label-row">
                <div style="display:flex;align-items:center">
                    <span class="label-text">${r.toUpperCase()}</span>${b}
                </div>
                <div class="chat-dots" onclick="event.stopPropagation(); msgOptions('${activeChatId}', ${h})">⋮</div>
            </div>
            <div class="content"></div>
        `;
        document.getElementById('chat-container').appendChild(d);
        const cDiv = d.querySelector('.content');

        if (typeof c === 'string' && r !== 'ai') {
            cDiv.innerHTML = marked.parse(c);
            addCodeFeatures(cDiv);
            Prism.highlightAllUnder(cDiv);
        } else if (Array.isArray(c)) {
            c.forEach(p => {
                if (p.type === 'text') cDiv.innerHTML += marked.parse(p.text);
                if (p.type === 'image_url') cDiv.innerHTML += `<img src="${p.image_url.url}" style="max-width:100%; border-radius:12px; margin-top:10px">`;
            });
            addCodeFeatures(cDiv);
            Prism.highlightAllUnder(cDiv);
        }

        scrollToBottom();
        return d;
    }

    function msgOptions(c, h) {
        openModal("Delete message?", (ok) => {
            if (ok) {
                chats[c].history.splice(h, 1);
                isThinking = false;
                abortController = null;
                document.getElementById('stop-btn').style.display = 'none';
                loadChat(c);
                save();
            }
        });
    }

    function createNewChat() {
        activeChatId = Date.now().toString();
        chats[activeChatId] = { title: "New Session", history: [{ role: "system", content: "Phoenix" }] };
        clearImg();
        save();
        loadChat(activeChatId);
    }

    function loadChat(id) {
        activeChatId = id;
        localStorage.setItem('phoenix_active_id', id);
        const chatContainer = document.getElementById('chat-container');
        chatContainer.innerHTML = '';

        const hasNonSystem = chats[id].history.some(m => m.role !== 'system');
        if (hasNonSystem) {
            document.getElementById('app-container').classList.remove('landing-view');
            chats[id].history.forEach((m, i) => {
                if (i === 0) return;
                appendMessage(m.role, m.content, m.modelUsed, i);
            });
        } else {
            document.getElementById('app-container').classList.add('landing-view');
        }

        renderList();
    }

    function renderList() {
        const l = document.getElementById('chat-list');
        l.innerHTML = '';
        Object.keys(chats).reverse().forEach(id => {
            l.innerHTML += `
                <div class="chat-item ${id === activeChatId ? 'active' : ''}" onclick="loadChat('${id}')">
                    <span style="flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${chats[id].title}</span>
                    <span onclick="event.stopPropagation(); deletePrompt('${id}')">✕</span>
                    <span onclick="event.stopPropagation(); renamePrompt('${id}')" style="margin-left:5px">✎</span>
                </div>
            `;
        });
    }

    function deletePrompt(id) {
        openModal("Delete session?", (ok) => {
            if (ok) {
                delete chats[id];
                const nextId = Object.keys(chats).pop();
                if (nextId) {
                    loadChat(nextId);
                } else {
                    createNewChat();
                }
                save();
            }
        });
    }

    function renamePrompt(id) {
        openModal("Rename session:", (v) => {
            if (v) {
                chats[id].title = v;
                renderList();
                save();
            }
        }, true, chats[id].title);
    }

    function clearAllPrompt() {
        openModal("Wipe all history?", (ok) => {
            if (ok) {
                localStorage.removeItem('phoenix_chats');
                chats = {};
                createNewChat();
            }
        });
    }

    function handleFileDirect(f) {
        const file = (f instanceof FileList) ? f[0] : f;
        if (!file || !file.type.startsWith('image/')) return;
        const r = new FileReader();
        r.onload = (e) => {
            attachedImg = e.target.result;
            const pb = document.getElementById('preview-bar');
            pb.style.display = 'flex';
            pb.innerHTML = `
                <img src="${attachedImg}" style="height:60px; border-radius:8px; border:1px solid var(--p-red)">
                <span onclick="clearImg()" style="color:red;cursor:pointer;margin-left:10px;font-weight:900">✕</span>
            `;
        };
        r.readAsDataURL(file);
    }

    function clearImg() {
        attachedImg = null;
        document.getElementById('preview-bar').style.display = 'none';
    }

    function save() {
        localStorage.setItem('phoenix_chats', JSON.stringify(chats));
    }

    window.addEventListener('paste', (e) => {
        const items = (e.clipboardData || e.originalEvent?.clipboardData).items;
        for (let i in items) {
            if (items[i].kind === 'file' && items[i].type.startsWith('image/')) {
                handleFileDirect(items[i].getAsFile());
            }
        }
    });

    const userInput = document.getElementById('user-input');
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    userInput.addEventListener('input', () => {
        userInput.style.height = 'auto';
        userInput.style.height = userInput.scrollHeight + 'px';
    });

    window.onload = () => {
        if (activeChatId && chats[activeChatId]) {
            loadChat(activeChatId);
        } else {
            createNewChat();
        }
    };
</script>
</body>
</html>
